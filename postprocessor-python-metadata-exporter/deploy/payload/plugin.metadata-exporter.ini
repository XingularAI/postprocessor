[common]
debug_level = INFO

[backend]
# url, min_confidence and heartbeat_seconds are set from the NX plugin UI (the "Settings"
# block in external_postprocessors.json), so they are NOT placed here to avoid duplication.
# (For dev/manual runs without the UI, code fallbacks apply: url=http://127.0.0.1:8000/ingest
#  or env METADATA_EXPORTER_BACKEND_URL; min_confidence=0.0; heartbeat=30 seconds.)
api_key =

# snapshot: cropped to the object bbox on DETECT (a new object).
# send_snapshot MUST match ReceiveInputTensor in external_postprocessors.json.
send_snapshot = true
jpeg_quality = 80
channel_order = RGB
snapshot_max_px = 640

# an object is considered "still present" while seen within the last N seconds (for DETECT dedupe).
object_ttl_seconds = 5

# HTTP resilience
http_timeout = 5
http_retries = 2
queue_max = 500
