[common]
debug_level = INFO

[backend]
# url, min_confidence and heartbeat_seconds are set from the NX plugin UI (the "Settings"
# block in external_postprocessors.json), so they are NOT placed here to avoid duplication.
# (For dev/manual runs without the UI, code fallbacks apply: url=http://127.0.0.1:8000/ingest
#  or env METADATA_EXPORTER_BACKEND_URL; min_confidence=0.0; heartbeat=30 seconds.)
api_key =

# snapshot: cropped to the object bbox on DETECT (a new object).
# send_snapshot MUST match ReceiveInputTensor in external_postprocessors.json.
send_snapshot = true
jpeg_quality = 80
channel_order = RGB
snapshot_max_px = 640

# an object is considered "still present" while seen within the last N seconds (for DETECT dedupe).
object_ttl_seconds = 5

# --- realtime tracking stream (heatmap / trajectories / live counts) ---
# NOTE: configparser does NOT support inline comments (e.g. `key = 5  # note`); a `#` after a
# value becomes part of the value and crashes getfloat/getint at startup. Keep comments on their
# own lines.
# "track" events send ALL current objects per sampled frame (NOT deduped), so the dashboard can
# build heatmaps, object trajectories and live counts. send_track & track_fps can also be set from
# the NX plugin UI (Settings); values here are the dev/manual-run fallbacks.
send_track = true
# track_fps: max track events/sec PER camera (0 = off)
track_fps = 5.0
# track_max_objects: cap objects[] per track event (drop lowest-confidence beyond this)
track_max_objects = 60

# --- periodic scene background (heatmap / trajectory backdrop) ---
# A downscaled full-frame JPEG per camera; requires send_snapshot=true (needs the frame image).
send_scene = true
# scene_seconds: min seconds between scene frames PER camera (0 = off)
scene_seconds = 60
# scene_max_px: longest side of the downscaled scene JPEG
scene_max_px = 960
# scene_jpeg_quality: scene JPEG quality (separate from the bbox-crop jpeg_quality)
scene_jpeg_quality = 70

# HTTP resilience
http_timeout = 5
http_retries = 2
queue_max = 500
# reserve queue headroom so a burst of track/scene can never crowd out a detect snapshot
queue_reserve = 64
# skip a scene whose base64 exceeds this many bytes (protects MAX_BODY + the send queue)
scene_max_b64_bytes = 350000
